---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://ghcr.io/home-operations/charts-mirror/cilium
    version: 1.18.6
    values: ["../kubernetes/apps/kube-system/cilium/app/helm-values.yaml"]
    hooks:
      - # Advertise Kubernetes VIP and BGP config
        events: ['postsync']
        command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=kustomize-controller
          - --filename=../kubernetes/apps/kube-system/cilium/app/networking.yaml
          - --filename=../kubernetes/apps/kube-system/cilium/app/vip.yaml
        showlogs: true

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.46.0
    values: ["../kubernetes/apps/kube-system/coredns/app/helm-values.yaml"]
    needs: ["kube-system/cilium"]

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.3
    values:
      ["../kubernetes/apps/cert-manager/cert-manager/app/helm/values.yaml"]
    needs: ["kube-system/coredns"]

  - name: envoy-gateway
    namespace: networking
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: v1.8.1
    needs: ["cert-manager/cert-manager"]

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.7.0
    needs: ["cert-manager/cert-manager"]

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.52.0
    values:
      ["../kubernetes/apps/flux-system/flux-operator/app/helm-values.yaml"]
    needs: ["kube-system/coredns"]
    force: true

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.52.0
    values:
      ["../kubernetes/apps/flux-system/flux-instance/app/helm-values.yaml"]
    needs: ["flux-system/flux-operator"]


  - name: onepassword
    namespace: external-secrets
    chart: oci://ghcr.io/bjw-s-labs/helm/app-template
    version: 5.0.1
    values:
      ["../kubernetes/apps/external-secrets/onepassword/app/helm-values.yaml"]
    needs: ["external-secrets/external-secrets"]
    hooks:
      - events: ['postsync']
        command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=kustomize-controller
          - --filename=../kubernetes/apps/external-secrets/onepassword/app/clustersecretstore.yaml
        showlogs: true
