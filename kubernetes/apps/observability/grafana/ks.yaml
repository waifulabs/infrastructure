---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
spec:
  interval: 1h
  path: ./kubernetes/puddle/observability/grafana/operator
  prune: true
  targetNamespace: observability
  wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
spec:
  dependsOn:
    - name: grafana-operator
    #- name: rook-ceph-cluster
    # namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/puddle/observability/grafana/instance
  prune: true
  targetNamespace: observability
  wait: false