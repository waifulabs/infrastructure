---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ok8-sh
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ok8-sh-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # GitHub API token for higher rate limits on the activity feed.
        NUXT_GITHUB_TOKEN: "{{ .NUXT_GITHUB_TOKEN }}"
        # Resend API key for the contact form.
        NUXT_RESEND_API_KEY: "{{ .NUXT_RESEND_API_KEY }}"
        # Cloudflare Turnstile keys (secret verifies, site key renders the widget).
        NUXT_TURNSTILE_SECRET_KEY: "{{ .NUXT_TURNSTILE_SECRET_KEY }}"
        NUXT_PUBLIC_TURNSTILE_SITE_KEY: "{{ .NUXT_PUBLIC_TURNSTILE_SITE_KEY }}"
  dataFrom:
    - extract:
        key: ok8-sh
