---
groups:
  - name: sonarr-standard
    rules:
      - alert: SonarrStandardDatabaseIsLocked
        expr: |
          sum by (app) (count_over_time({app=~"sonarr-standard"} |~ "(?i)database is locked"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical

      - alert: SonarrStandardDatabaseIsMalformed
        expr: |
          sum by (app) (count_over_time({app=~"sonarr-standard"} |~ "(?i)database disk image is malformed"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical
