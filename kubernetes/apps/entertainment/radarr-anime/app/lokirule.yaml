---
groups:
  - name: radarr-anime
    rules:
      - alert: RadarrAnimeDatabaseIsLocked
        expr: |
          sum by (app) (count_over_time({app=~"radarr-anime"} |~ "(?i)database is locked"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical

      - alert: RadarrAnimeDatabaseIsMalformed
        expr: |
          sum by (app) (count_over_time({app=~"radarr-anime"} |~ "(?i)database disk image is malformed"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical
