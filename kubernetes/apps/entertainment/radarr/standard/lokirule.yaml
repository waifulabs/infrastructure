---
groups:
  - name: radarr-standard
    rules:
      - alert: RadarrStandardDatabaseIsLocked
        expr: |
          sum by (app) (count_over_time({app=~"radarr-standard"} |~ "(?i)database is locked"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical

      - alert: RadarrStandardDatabaseIsMalformed
        expr: |
          sum by (app) (count_over_time({app=~"radarr-standard"} |~ "(?i)database disk image is malformed"[5m])) > 0
        for: 5m
        annotations:
          summary: >-
            {{ $labels.app }} is experiencing database issues
        labels:
          severity: critical
