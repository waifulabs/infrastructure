---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: juno
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: juno-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Discord bot token (Presence + Server Members intents enabled).
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        # Discord user ID whose presence is published.
        DISCORD_USER_ID: "{{ .DISCORD_USER_ID }}"
        # Optional: guild the bot should watch for the user's presence.
        DISCORD_GUILD_ID: "{{ .DISCORD_GUILD_ID }}"
        # TRMNL private plugin webhook URLs.
        TRMNL_TEXT_WEBHOOK_URL: "{{ .TRMNL_TEXT_WEBHOOK_URL }}"
        TRMNL_IMAGE_WEBHOOK_URL: "{{ .TRMNL_IMAGE_WEBHOOK_URL }}"
  dataFrom:
    - extract:
        key: juno
