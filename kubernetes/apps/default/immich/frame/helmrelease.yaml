---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-frame
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: immich-frame
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      immich-frame:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immichframe/immichframe
              tag: v1.0.33.0
            env:
              TZ: America/Los_Angeles
              ImmichServerUrl: http://immich.default.svc.cluster.local:2283
              PrimaryColor: "#5B3E7D"
              SecondaryColor: "#F5C04C"
              Albums: "6c98b6bd-6bad-4e9e-b78e-2ff83eb58d88"
              People: "adbd18d9-759f-4f36-9094-3b5c21d42adb,62fc8c95-aa84-46de-9aad-66ebb2b90c56"
              PhotoDateFormat: "MM-dd-yyyy"
            envFrom:
              - secretRef:
                  name: immich-frame-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: immich-frame
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "immich-frame.ok8.sh"
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
