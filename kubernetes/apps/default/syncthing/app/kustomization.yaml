---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
patches:
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: syncthing
      spec:
        dataSourceRef:
          name: syncthing
    target:
      kind: PersistentVolumeClaim
      name: syncthing
