---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-b2
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kopia-b2-secret
  # Explicit per-field refs: volsync-template also carries AWS_* fields (R2),
  # and a dataFrom merge would let them override the backblaze ones
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: backblaze
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: backblaze
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: volsync-template
        property: KOPIA_PASSWORD
