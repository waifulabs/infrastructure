---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/kromgo/main/config.schema.json
defaults:
  hidden: false

badge:
  size: 12

metrics:
  - name: talos_version
    query: node_os_info{name="Talos"}
    value: labels["version_id"]
    title: Talos Version

  - name: kubernetes_version
    query: kubernetes_build_info{service="kubernetes"}
    value: labels["git_version"]
    title: Kubernetes

  - name: cluster_cpu_usage
    query: round(cluster:node_cpu:ratio_rate5m * 100, 0.1)
    value: string(result) + "%"
    color: 'result <= 35 ? "green" : result <= 75 ? "orange" : "red"'
    title: CPU

  - name: cluster_node_count
    query: count(count by (node) (kube_node_status_condition{condition="Ready"}))
    value: humanizeNumber(result)
    color: 'result >= 3 ? "green" : result == 2 ? "orange" : "red"'
    title: Nodes

  - name: cluster_network_transmit_usage
    query: round(avg(instance:node_network_transmit_bytes_excluding_lo:rate5m / 1024 / 1024), 0.1)
    value: string(result) + "MB/s"
    color: 'result <= 50 ? "green" : result <= 75 ? "orange" : "red"'
    title: Transmit

  - name: cluster_network_receive_usage
    query: round(avg(instance:node_network_receive_bytes_excluding_lo:rate5m / 1024 / 1024), 0.1)
    value: string(result) + "MB/s"
    color: 'result <= 50 ? "green" : result <= 75 ? "orange" : "red"'
    title: Receive

  - name: cluster_pods_running
    query: sum(kube_pod_status_phase{phase="Running"})
    value: humanizeNumber(result)
    color: '"green"'
    title: Pods

  - name: cluster_power_usage
    query: round(avg_over_time(unpoller_device_outlet_ac_power_consumption[5m]), 0.1)
    value: humanizeNumber(math.round(result)) + "w"
    color: 'result <= 400 ? "green" : result <= 750 ? "orange" : "red"'
    title: Power

  - name: cluster_birth_age
    query: round(time() - min(kube_node_created))
    value: humanizeDuration(result)
    color: '"green"'
    title: Age

  - name: cluster_uptime_age
    query: round(avg(node_time_seconds{pod!=""} - node_boot_time_seconds{pod!=""}))
    value: humanizeDuration(result)
    color: '"green"'
    title: Uptime

  - name: prometheus_active_alerts
    query: sum(alertmanager_alerts{state="active"})
    value: humanizeNumber(result)
    color: 'result <= 1 ? "green" : result <= 10 ? "orange" : "red"'
    title: Alerts

  - name: node_memory_used
    query: node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
    value: humanizeBytes(result)
    color: '"green"'
    title: Memory
