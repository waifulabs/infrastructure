---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kopia-repository-entertainment
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/mnt/puddle/kubernetes/kopia
    type: Directory
  claimRef:
    namespace: entertainment
    name: kopia-repository
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-repository
  namespace: entertainment
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: ""
  volumeName: kopia-repository-entertainment
