---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app plex-next
  namespace: &namespace entertainment
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync
  dependsOn:
    - name: intel-device-plugin
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/puddle/entertainment/plex-next/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CACHE_CAPACITY: 25Gi
      VOLSYNC_CAPACITY: 50Gi
      VOLSYNC_STORAGECLASS: openebs-hostpath
      VOLSYNC_SCHEDULE: "10 * * * *"
  prune: true
  retryInterval: 2m
  targetNamespace: *namespace
  timeout: 5m
  wait: false
