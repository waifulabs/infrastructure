---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app brrpolice
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync
  interval: 1h
  path: ./kubernetes/puddle/entertainment/brrpolice/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_SCHEDULE: "4 * * * *"
  prune: true
  targetNamespace: entertainment