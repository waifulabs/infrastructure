---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qui
spec:
  interval: 1h
  path: ./kubernetes/puddle/entertainment/qui/app
  postBuild:
    substitute:
      APP: qui
  prune: true
  wait: false