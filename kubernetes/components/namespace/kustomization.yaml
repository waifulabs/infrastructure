---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./namespace.yaml
  - ./alerts
patches:
  - patch: |
      - op: add
        path: /spec/sourceRef
        value:
          kind: GitRepository
          name: home-kubernetes
          namespace: flux-system
    target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization