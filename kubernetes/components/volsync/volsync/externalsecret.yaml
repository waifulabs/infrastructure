---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ${APP}-volsync-secret
    template:
      data:
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        KOPIA_REPOSITORY: "kopia+http://kopia:{{ .KOPIA_PASSWORD }}@kopia.volsync-system.svc.cluster.local:51515"
        KOPIA_OVERRIDE_USERNAME: kopia
        KOPIA_OVERRIDE_HOSTNAME: volsync
  dataFrom:
    - extract:
        key: volsync-template