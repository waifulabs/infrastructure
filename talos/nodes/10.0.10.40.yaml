---
machine:
  type: controlplane
  install:
    image: factory.talos.dev/metal-installer/4dc56e498c4dd5c3d64aac5f26aed9f920658f54f3588f25605ac2fb56ad7fa9:{{ ENV.TALOS_VERSION }}
    diskSelector:
      serial: 50026B76878F13D4
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: puddle
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: net0
selector:
  match: mac(link.permanent_addr) == "7c:fe:90:19:f5:00"
---
apiVersion: v1alpha1
kind: BondConfig
name: bond0
links: [net0]
bondMode: active-backup
mtu: 9000
---
apiVersion: v1alpha1
kind: DHCPv4Config
name: bond0
clientIdentifier: mac
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.30
parent: bond0
vlanID: 30
mtu: 9000
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: local-hostpath
provisioning:
  diskSelector:
    match: disk.serial == "S64GNE0R817067" && !system_disk
  minSize: 1TB
---
apiVersion: v1alpha1
kind: WatchdogTimerConfig
device: /dev/watchdog0
timeout: 5m